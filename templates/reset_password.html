{% extends "base.html" %}
{% block content %}
<style>
  :root {
    --purple:#6c5ce7; --purple-lt:#a29bfe; --green:#00b894;
    --bg:#f4f3ff; --surface:#fff; --border:#ece9ff;
    --text:#1e1b3a; --muted:#8b87a8; --radius:16px;
    --shadow:0 4px 24px rgba(108,92,231,0.08);
  }
  body { background:var(--bg); font-family:'Segoe UI',sans-serif; }

  .rp-wrap {
    max-width: 440px;
    margin: 4rem auto;
    padding: 0 1.5rem;
  }

  .rp-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    box-shadow: var(--shadow);
  }

  .rp-card .rp-icon { font-size: 2.5rem; display:block; text-align:center; margin-bottom:1rem; }
  .rp-card h2 { font-size:1.5rem; font-weight:800; margin:0 0 6px; color:var(--text); text-align:center; }
  .rp-card p  { color:var(--muted); font-size:0.85rem; margin:0 0 1.6rem; text-align:center; }

  .flash {
    padding: 10px 14px; border-radius: 10px;
    font-size: 0.85rem; margin-bottom: 1rem; font-weight: 500;
  }
  .flash.error { background:#ffe8e4; color:#e17055; border:1.5px solid #ffc8be; }

  .form-group { margin-bottom: 1.1rem; }
  .form-group label {
    display:block; font-size:0.72rem; font-weight:700;
    color:var(--muted); text-transform:uppercase;
    letter-spacing:.05em; margin-bottom:6px;
  }
  .form-group input {
    width:100%; padding:11px 14px;
    border:1.5px solid var(--border); border-radius:10px;
    font-size:0.9rem; color:var(--text);
    background:var(--bg); outline:none; font-family:inherit;
    transition:border-color .2s, box-shadow .2s;
  }
  .form-group input:focus {
    border-color:var(--purple);
    box-shadow:0 0 0 3px rgba(108,92,231,0.1);
    background:#fff;
  }

  .pw-bar-wrap { height:4px; background:var(--border); border-radius:4px; margin-top:6px; overflow:hidden; }
  .pw-bar-fill { height:100%; border-radius:4px; width:0%; transition:width .3s, background .3s; }
  .pw-hint { font-size:0.75rem; margin-top:4px; color:var(--muted); }
  .match-msg { font-size:0.75rem; margin-top:4px; }

  .btn-reset {
    width:100%;
    background:linear-gradient(135deg, var(--purple), var(--purple-lt));
    color:#fff; border:none; padding:13px;
    border-radius:10px; font-size:0.95rem;
    font-weight:700; cursor:pointer; font-family:inherit;
    margin-top:6px; transition:opacity .2s, transform .15s;
  }
  .btn-reset:hover { opacity:.9; transform:translateY(-1px); }
</style>

<div class="rp-wrap">
  <div class="rp-card">
    <span class="rp-icon">🔐</span>
    <h2>Set New Password</h2>
    <p>Choose a strong password for your account.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/reset-password/{{ token }}">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" id="newPw"
               placeholder="Min 6 characters"
               oninput="checkStrength(this.value)" required>
        <div class="pw-bar-wrap">
          <div class="pw-bar-fill" id="pwBar"></div>
        </div>
        <div class="pw-hint" id="pwHint">Min 6 characters</div>
      </div>

      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" id="confirmPw"
               placeholder="Repeat new password"
               oninput="checkMatch()" required>
        <div class="match-msg" id="matchMsg"></div>
      </div>

      <button type="submit" class="btn-reset">Reset Password</button>
    </form>
  </div>
</div>

<script>
function checkStrength(val) {
  const bar = document.getElementById('pwBar');
  const hint = document.getElementById('pwHint');
  let score = 0;
  if (val.length >= 6)           score++;
  if (val.length >= 10)          score++;
  if (/[A-Z]/.test(val))         score++;
  if (/[0-9]/.test(val))         score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    {w:'0%',   bg:'#ece9ff', label:'Min 6 characters'},
    {w:'20%',  bg:'#e17055', label:'😟 Very weak'},
    {w:'40%',  bg:'#fd9644', label:'😐 Weak'},
    {w:'60%',  bg:'#ffd32a', label:'🙂 Fair'},
    {w:'80%',  bg:'#a29bfe', label:'😊 Good'},
    {w:'100%', bg:'#00b894', label:'💪 Strong!'},
  ];
  const l = levels[Math.min(score,5)];
  bar.style.width = l.w;
  bar.style.background = l.bg;
  hint.textContent = l.label;
}

function checkMatch() {
  const pw1 = document.getElementById('newPw').value;
  const pw2 = document.getElementById('confirmPw').value;
  const msg = document.getElementById('matchMsg');
  if (!pw2) { msg.textContent=''; return; }
  if (pw1===pw2) { msg.textContent='✓ Passwords match'; msg.style.color='#00b894'; }
  else           { msg.textContent='✗ Do not match';    msg.style.color='#e17055'; }
}
</script>
{% endblock %}
